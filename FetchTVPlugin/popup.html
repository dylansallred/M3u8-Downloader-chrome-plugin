/* Dark overrides for Bootstrap light theme utilities used in popup */
.bg-warning-subtle{background:rgba(9,13,21,0.96)!important;border-bottom:1px solid rgba(255,255,255,0.04);} 
.text-warning-emphasis{color:var(--text-soft)!important;}
.text-black-50{color:var(--text)!important;}
.bg-white{background:var(--bg-elevated)!important;color:var(--text)!important;border-radius:999px;}
.bg-light-subtle{background:var(--bg-elevated)!important;}
.border-light-subtle{border-color:var(--border-subtle)!important;}

/* Buttons */
.btn-danger{background:linear-gradient(135deg,var(--danger),#ff3360)!important;border:none!important;color:#fff!important;box-shadow:0 10px 24px rgba(255,75,92,0.55);} 
.btn-danger:hover{filter:brightness(1.05);} 

/* List area background */
#main{background:linear-gradient(145deg,rgba(17,23,36,0.96),rgba(10,14,24,0.98));border-radius:var(--radius-lg);border:1px solid rgba(255,255,255,0.04);} 

/* Horizontal separators */
hr{border-color:rgba(255,255,255,0.06);} 

/* Badges / HLS pill */
.badge,.btn-light{background:var(--bg-muted)!important;color:var(--text)!important;border:1px solid var(--border-subtle)!important;}

/* Download button outline */
.btn-outline-secondary,.btn-outline-dark{color:var(--text-muted)!important;border-color:rgba(255,255,255,0.12)!important;background:rgba(14,19,32,0.9)!important;}
.btn-outline-secondary:disabled,.btn-outline-dark:disabled{opacity:0.4;}

/* Danger icon button ("-" delete) */
.btn-outline-danger{border-color:rgba(255,75,92,0.6)!important;color:var(--danger)!important;background:rgba(35,10,16,0.6)!important;}

/* Record section text */
.display-1.text-warning{color:var(--accent)!important;}

/* Inputs / textareas (URL details, filters, etc.) */
.form-control,textarea{background:var(--bg-muted)!important;color:var(--text)!important;border-color:var(--border-subtle)!important;}
.form-control:focus,textarea:focus{background:#171d2b!important;border-color:var(--accent)!important;box-shadow:0 0 0 .15rem rgba(124,92,255,0.35)!important;}

/* URL detail card / white cards */
.card,.card-body{background:var(--bg-elevated)!important;color:var(--text)!important;border-color:var(--border-subtle)!important;}

/* Size filter limits row */
.size-limit-row{flex-direction:column!important;align-items:flex-start!important;gap:0.35rem;}
.size-limit-row .form-control{width:100%!important;max-width:100%!important;font-size:0.85rem!important;}

/* Settings panel (modal / offcanvas) */
.modal-content,.offcanvas,.offcanvas-body{background:rgba(9,13,21,0.98)!important;color:var(--text)!important;border:1px solid rgba(255,255,255,0.06)!important;}
.offcanvas{width:min(360px,100%)!important;max-width:100%!important;}
.offcanvas-body{overflow-x:hidden!important;font-size:0.875rem!important;}
.offcanvas-body .form-control{display:block;width:100%!important;max-width:100%!important;font-size:0.8rem!important;margin-bottom:0.35rem;}

/* Hide number input spin buttons in settings and ensure text is visible */
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
input[type=number]{ -moz-appearance:textfield; appearance:textfield; color:var(--text)!important; background:var(--bg-muted)!important; padding-inline:6px; }
.modal-header,.modal-footer,.offcanvas-header{border-color:rgba(255,255,255,0.04)!important;background:var(--bg-elevated)!important;}
.modal-title,.offcanvas-title{color:var(--text)!important;font-weight:600!important;}

/* Close buttons (X) */
.btn-close,.btn-close-sm{filter:invert(1) brightness(2);opacity:0.9;}

/* Switches / checkboxes (settings & inject toggle) */
.form-check-input{background-color:#202738!important;border-color:#202738!important;}
.form-check-input:checked{background-color:var(--accent)!important;border-color:var(--accent)!important;}
</style>
