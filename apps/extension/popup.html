<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FetchV Bridge</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="flex items-center justify-between px-3.5 pt-3.5 pb-2">
      <div class="flex items-center gap-2">
        <h1 class="text-sm font-semibold tracking-tight text-fg">FetchV</h1>
        <span class="pill pill-muted">Bridge</span>
      </div>
      <div class="flex items-center gap-2">
        <span id="statusDot" class="status-dot checking"></span>
        <span id="connectionStatus" class="text-xs text-fg-muted">Checking...</span>
      </div>
    </header>

    <!-- Pairing Card -->
    <section id="pairingCard" class="glass glass-glow mx-3.5 mb-2.5 p-3.5">
      <div class="flex items-center gap-2 mb-2">
        <svg class="w-4 h-4 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <h2 class="text-sm font-semibold text-fg">Pair Extension</h2>
      </div>
      <p class="text-xs text-fg-muted mb-3 leading-relaxed">
        Generate a pairing code in the desktop app settings, then enter it here.
      </p>
      <div class="flex gap-2">
        <input id="pairingCode" class="input flex-1" maxlength="12" placeholder="PAIRING CODE" />
        <button id="pairButton" class="btn btn-primary">Pair</button>
      </div>
      <p id="pairingResult" class="text-xs text-fg-muted mt-2"></p>
    </section>

    <!-- Detected Media -->
    <section class="glass mx-3.5 mb-2.5 p-3.5">
      <div class="flex items-center justify-between mb-1">
        <h2 class="text-sm font-semibold text-fg">Detected Media</h2>
        <button id="refreshButton" class="btn btn-ghost text-xs px-2 py-1">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          Refresh
        </button>
      </div>
      <div id="mediaList" class="flex flex-col gap-2 mt-2 max-h-80 overflow-y-auto pr-0.5"></div>
      <div id="emptyState" class="flex flex-col items-center justify-center py-8 gap-2">
        <svg class="w-8 h-8 text-fg-subtle opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path d="M15 10l4.553-2.276A1 1 0 0 1 21 8.618v6.764a1 1 0 0 1-1.447.894L15 14M5 18h8a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2z"/>
        </svg>
        <p class="text-xs text-fg-subtle">No media detected on this tab yet.</p>
        <p class="text-[0.6875rem] text-fg-subtle opacity-60">Browse a page with video content to detect streams.</p>
      </div>
    </section>

    <!-- Footer -->
    <footer class="flex items-center justify-between px-3.5 pb-3.5 pt-1">
      <button id="clearButton" class="btn btn-danger text-xs">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
        Clear Media
      </button>
      <span class="text-[0.625rem] text-fg-subtle font-mono">
        <span id="apiTarget">127.0.0.1:49732</span>
      </span>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
