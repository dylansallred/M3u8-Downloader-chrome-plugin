name: CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch bundled yt-dlp
        run: npm run fetch:yt-dlp --workspace @m3u8/desktop

      - name: Fetch bundled ffmpeg/ffprobe
        run: npm run fetch:ffmpeg --workspace @m3u8/desktop

      - name: Verify bundled binaries (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          apps/desktop/bin/yt-dlp --version
          apps/desktop/bin/ffmpeg -version | head -n 1
          apps/desktop/bin/ffprobe -version | head -n 1

      - name: Verify bundled binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          ./apps/desktop/bin/yt-dlp.exe --version
          ./apps/desktop/bin/ffmpeg.exe -version | Select-Object -First 1
          ./apps/desktop/bin/ffprobe.exe -version | Select-Object -First 1

      - name: Lint
        run: npm run lint

      - name: Typecheck desktop
        run: npm run typecheck:desktop

      - name: Run tests
        run: npm test

      - name: Build desktop renderer
        run: npm run build:desktop

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: xvfb-run --auto-servernum npm run test:e2e -- --project=chromium

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
