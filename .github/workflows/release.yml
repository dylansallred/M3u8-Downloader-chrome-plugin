name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  macos-desktop:
    name: Desktop macOS (Signed + Notarized)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate macOS signing/notarization secrets
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          missing=0
          for key in APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID CSC_LINK CSC_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync desktop version with tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --workspace @m3u8/desktop

      - name: Build and publish desktop artifacts (macOS)
        run: npm run dist --workspace @m3u8/desktop -- --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      - name: Verify notarization staple (DMG)
        run: |
          set -euo pipefail
          DMG_FILE="$(find apps/desktop/dist-electron -type f -name "*.dmg" | head -n 1)"
          if [ -z "${DMG_FILE}" ]; then
            echo "No DMG artifact found for notarization validation."
            exit 1
          fi
          xcrun stapler staple "${DMG_FILE}"
          xcrun stapler validate "${DMG_FILE}"

  windows-desktop:
    name: Desktop Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync desktop version with tag
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          npm version $version --no-git-tag-version --workspace @m3u8/desktop

      - name: Build and publish desktop artifacts (Windows)
        run: npm run dist --workspace @m3u8/desktop -- --publish=always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Verify code signatures (when signing is configured)
        shell: pwsh
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WIN_CSC_LINK) -or [string]::IsNullOrWhiteSpace($env:WIN_CSC_KEY_PASSWORD)) {
            Write-Host "Skipping signature verification because Windows signing secrets are not configured."
            exit 0
          }
          $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
          if (-not $signtool) {
            Write-Host "signtool.exe not found in PATH"
            exit 1
          }
          $targets = Get-ChildItem -Path "apps/desktop/dist-electron" -Recurse -File `
            | Where-Object { $_.Extension -in @(".exe", ".msi") }
          if (-not $targets -or $targets.Count -eq 0) {
            Write-Host "No Windows installer artifacts found for signature validation."
            exit 1
          }
          foreach ($file in $targets) {
            Write-Host "Verifying signature: $($file.FullName)"
            & signtool.exe verify /pa /v $file.FullName
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

  extension:
    name: Package Extension
    needs: [macos-desktop, windows-desktop]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zip extension
        run: |
          cd apps/extension
          zip -r ../../m3u8-extension.zip . -x "*.DS_Store"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3u8-extension
          path: m3u8-extension.zip

      - name: Attach extension to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: m3u8-extension.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
